<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>DWA | Base Apparel Coming Soon</title>
</head>
<body>
  <div class="base-apparel-container">
    <div class="base-apparel-container-left">
      <img src="./images/logo.svg" alt="base-apparel-logo" class="base-apparel-logo" />
      <h1 class="coming-soon-title">
        <span class="we-are">
          We're
        </span>
        coming soon
      </h1> 
      <p class="coming-soon-msg">
        Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.
      </p>
      <form action="" class="input-email">
        <input type="text" placeholder="Email Address" />
        <img src="./images/icon-error.svg" alt="error-icon" class="error-icon">
        <button class="submit-email-btn">
          <img src="./images/icon-arrow.svg" alt="right-arrow-icon" class="right-arrow-icon" />
        </button>
        <small class="error-msg-input-email">
          Please provide a valid email
        </small>
      </form>
    </div>
    <div class="base-apparel-container-right">
      
    </div> 
  </div>
</body>
</html>
